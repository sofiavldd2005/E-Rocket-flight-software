/**:
  ros__parameters:
    offboard:
      mass_of_system: 1.6 # Total vehicle mass in kg
      lever_arm: 0.27 # Distance from Center of Mass to TVC gimbal pivot in meters
      gravitational_acceleration: 9.81
      moment_of_inertia: 0.375 # Moment of inertia along the transverse axes (kg*m^2)
      vehicle:
        servo_active: true # Set to false to physically lock servos (e.g. for SITL)
        motor_active: true # Set to false to physically lock motors
        servo_max_tilt_angle_degrees: 30. # Hardware constraint on maximum TVC gimbal angle
        default_motor_pwm: 0.40 # Base throttle active when position controllers are off
        motor_max_pwm: 0.8 # Hardware constraint on maximum motor PWM
        motor_thrust_curve: # Physical thrust characterization: newtons = (pwm * m + b) / 1000 * g;
          m: 2696.6
          b: -38.95
        delta_torque: # tau_delta_bar =  a * delta_M + b * M_bar + c
          a: 27.631
          b: 1.4667
          c: -0.702
      controller:
        attitude:
          active: [true, true, true]
          frequency_hertz: 50.
          gains:
            #   Roll, Pitch, Yaw
            k_p: [5.0, 5.0, 5.0] # instead of rewriting the C++ code to implement proper integral anti-windup clamping, he just turned off the I term entirely for the X and y?
            k_d: [2.0, 2.0, 2.0]
            k_i: [0.0, 0.0, 0.5]
        position:
          active: true
          frequency_hertz: 50.
          gains:
            k_p: [3.0, 3.0, 8.5] # Proportional gain
            k_d: [2.5, 2.5, 3.0] # Derivative gain
            k_i: [0.2, 0.2, 1.0] # Integral gain
            k_ff: [1.0, 1.0, 1.0] # Feedforward gain
            min_output: [-20., -20., -20.] # Minimum output of each PID
            max_output: [20., 20., 20.]
        generic:
          frequency_hertz: 100.
      mission:
        trajectory_setpoint:
          active: true
        takeoff_climb_height_meters: 0.6
        takeoff_climb_duration_seconds: 3.0
        landing_descent_duration_seconds: 4.0
